name: Naver Realtime STK Crawler Sequential

on:
  workflow_dispatch: # 수동 실행만 가능

jobs:
  morning_session:
    name: Morning Session (08:50 - 12:00)
    runs-on: ubuntu-latest
    timeout-minutes: 200

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Naver Crawler (Morning)
        env:
          Project_URL: ${{ secrets.Project_URL }}
          Secret_keys: ${{ secrets.Secret_keys }}
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          # 12:00에 종료되도록 설정된 루프 실행
          python naver/naver_realtime.py morning

  afternoon_session:
    name: Afternoon Session (12:00 - 15:20)
    needs: morning_session
    if: always() # 오전 세션 결과와 상관없이 실행
    runs-on: ubuntu-latest
    timeout-minutes: 210

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Naver Crawler (Afternoon)
        env:
          Project_URL: ${{ secrets.Project_URL }}
          Secret_keys: ${{ secrets.Secret_keys }}
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          # 15:20에 종료되도록 설정된 루프 실행
          python naver/naver_realtime.py afternoon
