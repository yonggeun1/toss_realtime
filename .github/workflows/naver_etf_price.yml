name: Naver ETF Price Crawler Sequential

on:
  workflow_dispatch: # 수동 실행만 가능

jobs:
  morning_session:
    name: Morning Session (08:50 - 12:00)
    runs-on: ubuntu-latest
    timeout-minutes: 200

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.9
        uses: actions/setup-python@v3
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Naver ETF Price Crawler (Morning)
        env:
          Project_URL: ${{ secrets.Project_URL }}
          Secret_keys: ${{ secrets.Secret_keys }}
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python naver/naver_etf_price.py morning

  afternoon_session:
    name: Afternoon Session (12:00 - 15:20)
    needs: morning_session
    if: always() # 오전 세션 결과와 상관없이 실행
    runs-on: ubuntu-latest
    timeout-minutes: 210

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.9
        uses: actions/setup-python@v3
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Naver ETF Price Crawler (Afternoon)
        env:
          Project_URL: ${{ secrets.Project_URL }}
          Secret_keys: ${{ secrets.Secret_keys }}
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python naver/naver_etf_price.py afternoon
